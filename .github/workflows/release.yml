name: release

on:
  release:
    types:
      - created

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxdamage-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxrandr-dev \
            libxrender-dev \
            libxss-dev \
            libxtst-dev \
            libxkbcommon-dev \
            libpango1.0-dev \
            libcairo2-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libgobject-2.0-dev \
            libatk1.0-dev \
            libgio2.0-cil-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-make
        uses: davidB/rust-cargo-make@v1

      - name: Cache CEF binary
        id: cache-cef
        uses: actions/cache@v4
        with:
          path: cef_binary_*.tar.bz2
          key: cef-137.0.19-g8a1c4ce-chromium-137.0.7151.121-linux64

      - name: Download and extract CEF binary
        run: |
          CEF_VERSION="137.0.19+g8a1c4ce+chromium-137.0.7151.121"
          CEF_PACKAGE="cef_binary_${CEF_VERSION}_linux64"
          CEF_URL="https://cef-builds.spotifycdn.com/cef_binary_137.0.19%2Bg8a1c4ce%2Bchromium-137.0.7151.121_linux64.tar.bz2"

          if [ ! -f "${CEF_PACKAGE}.tar.bz2" ]; then
            echo "Downloading CEF binary..."
            curl -L -f -o "${CEF_PACKAGE}.tar.bz2" "${CEF_URL}" || {
              echo "Failed to download CEF. Trying to fetch available versions..."
              curl -s "https://cef-builds.spotifycdn.com/index.json" | grep -o '"cef_version":"[^"]*137[^"]*"' | head -5
              exit 1
            }
          else
            echo "Using cached CEF binary"
          fi

          echo "Extracting CEF binary..."
          tar -xjf "${CEF_PACKAGE}.tar.bz2"

          echo "CEF_ROOT=$PWD/${CEF_PACKAGE}" >> $GITHUB_ENV
          echo "CEF extracted to: $PWD/${CEF_PACKAGE}"

      - name: Safety verification
        run: cargo clippy -- -A clippy::not_unsafe_ptr_arg_deref -A clippy::missing_panics_doc -A unused_unsafe -A unsafe_code -D warnings

      - name: Build with cargo-make
        env:
          CEF_ROOT: ${{ env.CEF_ROOT }}
        run: cargo make build

      - name: Verify with JPL standards
        run: cargo make verify

      - name: Strip binary for size optimization
        run: strip target/release/libspotifyadblock.so

      - name: Generate checksums
        run: |
          cd target/release
          sha256sum libspotifyadblock.so > spotify-adblock.sha256

      - name: Attach binary to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            target/release/libspotifyadblock.so
            target/release/spotify-adblock.sha256

      - name: Upload to release assets
        uses: actions/upload-artifact@v4
        with:
          name: spotify-adblock-release
          path: |
            target/release/libspotifyadblock.so
            target/release/spotify-adblock.sha256
